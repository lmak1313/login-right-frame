<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Innovative Recruitment</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      background-image: url('https://images.unsplash.com/photo-1521737852567-6949f3f9f2b5?w=1600');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Segoe UI, Arial, sans-serif;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.55);
      color: white;
      padding: 30px 40px;
      border-radius: 14px;
      max-width: 440px;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    p {
      font-size: 16px;
      line-height: 1.4;
    }

    ul {
      padding-left: 20px;
    }

    li {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>Innovative Recruitment</h1>
    <p>
      Build the future with smart hiring processes and modern talent management.
    </p>
    <ul>
      <li>✔ Smart Recruitment</li>
      <li>✔ Data‑Driven Decisions</li>
      <li>✔ Future‑Ready Workforce</li>
    </ul>
  </div>
</body>
</html>
